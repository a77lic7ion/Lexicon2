<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="obliterateGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   style="stop-color:#FF0000;stop-opacity:1" />
      <stop offset="80%"  style="stop-color:#8B0000;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#000;stop-opacity:0.5" />
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#obliterateGrad)" />
  <rect x="10" y="45" width="80" height="10" fill="#FFF" opacity="0.8">
    <animate attributeName="scale" values="1;1.2;1" dur="0.3s" repeatCount="indefinite" />
  </rect>
</svg>
