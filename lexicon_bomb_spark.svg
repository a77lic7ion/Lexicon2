<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <defs>
    <linearGradient id="pageBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#080D13"/>
    </linearGradient>
    <linearGradient id="boardSurf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141E2C"/>
      <stop offset="100%" style="stop-color:#0A1018"/>
    </linearGradient>
    <radialGradient id="sparkCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   style="stop-color:#FFFFFF"/>
      <stop offset="20%"  style="stop-color:#FFFFA0"/>
      <stop offset="55%"  style="stop-color:#FFD700"/>
      <stop offset="80%"  style="stop-color:#FF9500"/>
      <stop offset="100%" style="stop-color:#FF450000"/>
    </radialGradient>
    <linearGradient id="rowPulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#FFD70000"/>
      <stop offset="15%"  style="stop-color:#FFD700AA"/>
      <stop offset="50%"  style="stop-color:#FFFFFF"/>
      <stop offset="85%"  style="stop-color:#FFD700AA"/>
      <stop offset="100%" style="stop-color:#FFD70000"/>
    </linearGradient>
    <radialGradient id="cellReveal" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   style="stop-color:#FFE566;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#FF950000"/>
    </radialGradient>
    <linearGradient id="ironGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A4A5A"/>
      <stop offset="100%" style="stop-color:#1A1A25"/>
    </linearGradient>
    <linearGradient id="boltFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#FFFFFF"/>
      <stop offset="40%"  style="stop-color:#FFE566"/>
      <stop offset="100%" style="stop-color:#FF9500"/>
    </linearGradient>
    <filter id="sparkGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="blur1"/>
      <feFlood flood-color="#FFD700" flood-opacity="0.9" result="c1"/>
      <feComposite in="c1" in2="blur1" operator="in" result="glow1"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="28" result="blur2"/>
      <feFlood flood-color="#FF6600" flood-opacity="0.5" result="c2"/>
      <feComposite in="c2" in2="blur2" operator="in" result="glow2"/>
      <feMerge>
        <feMergeNode in="glow2"/>
        <feMergeNode in="glow1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="pulseGlow" x="-5%" y="-200%" width="110%" height="500%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#FFD700" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="arcGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
      <feFlood flood-color="#FFE566" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="boardShadow">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#000000" flood-opacity="0.75"/>
    </filter>
    <filter id="cellGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feFlood flood-color="#FFD700" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="labelGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#FFD700" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grain" x="0" y="0" width="1000" height="22" patternUnits="userSpaceOnUse">
      <line x1="0" y1="11" x2="1000" y2="11" stroke="#FFFFFF" stroke-width="0.4" opacity="0.025"/>
      <line x1="0" y1="18" x2="1000" y2="18" stroke="#000000" stroke-width="0.3" opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="1000" height="700" fill="url(#pageBg)"/>
  <rect width="1000" height="700" fill="url(#grain)"/>

  <!-- Board -->
  <rect x="80" y="80" width="840" height="540" rx="8" fill="url(#boardSurf)" filter="url(#boardShadow)"/>
  <rect x="80" y="80" width="840" height="540" rx="8" fill="url(#grain)" opacity="0.5"/>
  <rect x="80" y="80" width="840" height="540" rx="8" fill="none" stroke="#2A3A50" stroke-width="2"/>

  <!-- Runic border -->
  <g fill="#4A3A18" font-family="serif" font-size="12" opacity="0.5">
    <text x="100" y="106">ᚠ</text><text x="118" y="106">ᚢ</text><text x="136" y="106">ᚦ</text>
    <text x="154" y="106">ᚨ</text><text x="172" y="106">ᚱ</text><text x="190" y="106">ᚲ</text>
    <text x="208" y="106">ᚷ</text><text x="226" y="106">ᚹ</text><text x="244" y="106">ᚺ</text>
    <text x="620" y="106">ᛁ</text><text x="638" y="106">ᛃ</text><text x="656" y="106">ᛇ</text>
    <text x="674" y="106">ᛈ</text><text x="692" y="106">ᛉ</text><text x="710" y="106">ᛊ</text>
    <text x="728" y="106">ᛏ</text><text x="746" y="106">ᛒ</text><text x="764" y="106">ᛖ</text>
    <text x="800" y="106">ᛚ</text><text x="836" y="106">ᛞ</text><text x="872" y="106">ᚠ</text>
  </g>

  <!-- Grid background -->
  <rect x="160" y="130" width="680" height="380" fill="#070E18" opacity="0.95"/>

  <!-- Row 5 reveal glow (y=282 to y=320) -->
  <rect x="160" y="282" width="680" height="38" fill="#FFD700" opacity="0.08" filter="url(#cellGlow)"/>
  <rect x="160" y="282" width="68" height="38" fill="url(#cellReveal)"/>
  <rect x="228" y="282" width="68" height="38" fill="url(#cellReveal)"/>
  <rect x="296" y="282" width="68" height="38" fill="url(#cellReveal)"/>
  <rect x="364" y="282" width="68" height="38" fill="url(#cellReveal)"/>
  <rect x="432" y="282" width="68" height="38" fill="url(#cellReveal)"/>
  <rect x="500" y="282" width="68" height="38" fill="url(#cellReveal)"/>
  <rect x="568" y="282" width="68" height="38" fill="url(#cellReveal)"/>
  <rect x="636" y="282" width="68" height="38" fill="url(#cellReveal)"/>
  <rect x="704" y="282" width="68" height="38" fill="url(#cellReveal)"/>
  <rect x="772" y="282" width="68" height="38" fill="url(#cellReveal)"/>

  <!-- Row sweep line -->
  <rect x="160" y="299" width="680" height="2" fill="url(#rowPulse)" filter="url(#pulseGlow)" opacity="0.9"/>

  <!-- Grid lines glow pass -->
  <g stroke="#C8922A" stroke-width="2.5" opacity="0.2">
    <line x1="160" y1="130" x2="160" y2="510"/><line x1="228" y1="130" x2="228" y2="510"/>
    <line x1="296" y1="130" x2="296" y2="510"/><line x1="364" y1="130" x2="364" y2="510"/>
    <line x1="432" y1="130" x2="432" y2="510"/><line x1="500" y1="130" x2="500" y2="510"/>
    <line x1="568" y1="130" x2="568" y2="510"/><line x1="636" y1="130" x2="636" y2="510"/>
    <line x1="704" y1="130" x2="704" y2="510"/><line x1="772" y1="130" x2="772" y2="510"/>
    <line x1="840" y1="130" x2="840" y2="510"/>
    <line x1="160" y1="130" x2="840" y2="130"/><line x1="160" y1="168" x2="840" y2="168"/>
    <line x1="160" y1="206" x2="840" y2="206"/><line x1="160" y1="244" x2="840" y2="244"/>
    <line x1="160" y1="282" x2="840" y2="282"/><line x1="160" y1="320" x2="840" y2="320"/>
    <line x1="160" y1="358" x2="840" y2="358"/><line x1="160" y1="396" x2="840" y2="396"/>
    <line x1="160" y1="434" x2="840" y2="434"/><line x1="160" y1="472" x2="840" y2="472"/>
    <line x1="160" y1="510" x2="840" y2="510"/>
  </g>
  <!-- Grid lines sharp pass -->
  <g stroke="#D4A030" stroke-width="0.8" opacity="0.85">
    <line x1="160" y1="130" x2="160" y2="510"/><line x1="228" y1="130" x2="228" y2="510"/>
    <line x1="296" y1="130" x2="296" y2="510"/><line x1="364" y1="130" x2="364" y2="510"/>
    <line x1="432" y1="130" x2="432" y2="510"/><line x1="500" y1="130" x2="500" y2="510"/>
    <line x1="568" y1="130" x2="568" y2="510"/><line x1="636" y1="130" x2="636" y2="510"/>
    <line x1="704" y1="130" x2="704" y2="510"/><line x1="772" y1="130" x2="772" y2="510"/>
    <line x1="840" y1="130" x2="840" y2="510"/>
    <line x1="160" y1="130" x2="840" y2="130"/><line x1="160" y1="168" x2="840" y2="168"/>
    <line x1="160" y1="206" x2="840" y2="206"/><line x1="160" y1="244" x2="840" y2="244"/>
    <line x1="160" y1="282" x2="840" y2="282"/><line x1="160" y1="320" x2="840" y2="320"/>
    <line x1="160" y1="358" x2="840" y2="358"/><line x1="160" y1="396" x2="840" y2="396"/>
    <line x1="160" y1="434" x2="840" y2="434"/><line x1="160" y1="472" x2="840" y2="472"/>
    <line x1="160" y1="510" x2="840" y2="510"/>
  </g>

  <!-- Row 5 electrified grid lines -->
  <g stroke="#FFE566" stroke-width="1.5" opacity="0.7" filter="url(#pulseGlow)">
    <line x1="160" y1="282" x2="840" y2="282"/>
    <line x1="160" y1="320" x2="840" y2="320"/>
  </g>

  <!-- Column labels A-J -->
  <g font-family="Georgia, serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#F5C842" filter="url(#labelGlow)">
    <text x="194" y="122">A</text><text x="262" y="122">B</text><text x="330" y="122">C</text>
    <text x="398" y="122">D</text><text x="466" y="122">E</text><text x="534" y="122">F</text>
    <text x="602" y="122">G</text><text x="670" y="122">H</text><text x="738" y="122">I</text>
    <text x="806" y="122">J</text>
    <text x="194" y="528">A</text><text x="262" y="528">B</text><text x="330" y="528">C</text>
    <text x="398" y="528">D</text><text x="466" y="528">E</text><text x="534" y="528">F</text>
    <text x="602" y="528">G</text><text x="670" y="528">H</text><text x="738" y="528">I</text>
    <text x="806" y="528">J</text>
  </g>

  <!-- Row labels 1-10 -->
  <g font-family="Georgia, serif" font-size="14" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#F5C842" filter="url(#labelGlow)">
    <text x="146" y="149">1</text><text x="146" y="187">2</text><text x="146" y="225">3</text>
    <text x="146" y="263">4</text>
    <text x="146" y="301" fill="#FFFFFF" filter="url(#pulseGlow)">5</text>
    <text x="146" y="339">6</text><text x="146" y="377">7</text><text x="146" y="415">8</text>
    <text x="146" y="453">9</text><text x="143" y="491">10</text>
    <text x="854" y="149">1</text><text x="854" y="187">2</text><text x="854" y="225">3</text>
    <text x="854" y="263">4</text>
    <text x="854" y="301" fill="#FFFFFF" filter="url(#pulseGlow)">5</text>
    <text x="854" y="339">6</text><text x="854" y="377">7</text><text x="854" y="415">8</text>
    <text x="854" y="453">9</text><text x="857" y="491">10</text>
  </g>

  <!-- Row 5 question marks -->
  <g font-family="Georgia, serif" font-size="16" text-anchor="middle" dominant-baseline="middle" fill="#FFD700" opacity="0.5" filter="url(#pulseGlow)">
    <text x="194" y="301">?</text><text x="262" y="301">?</text><text x="330" y="301">?</text>
    <text x="398" y="301">?</text><text x="466" y="301">?</text><text x="534" y="301">?</text>
    <text x="602" y="301">?</text><text x="670" y="301">?</text><text x="738" y="301">?</text>
    <text x="806" y="301">?</text>
  </g>

  <!-- Iron corner brackets -->
  <g fill="url(#ironGrad)">
    <rect x="80" y="80" width="50" height="10" rx="3"/><rect x="80" y="80" width="10" height="50" rx="3"/>
    <rect x="870" y="80" width="50" height="10" rx="3"/><rect x="910" y="80" width="10" height="50" rx="3"/>
    <rect x="80" y="610" width="50" height="10" rx="3"/><rect x="80" y="560" width="10" height="50" rx="3"/>
    <rect x="870" y="610" width="50" height="10" rx="3"/><rect x="910" y="560" width="10" height="50" rx="3"/>
  </g>
  <g fill="#222230">
    <circle cx="104" cy="100" r="4"/><circle cx="96" cy="108" r="3"/>
    <circle cx="896" cy="100" r="4"/><circle cx="904" cy="108" r="3"/>
    <circle cx="104" cy="600" r="4"/><circle cx="96" cy="592" r="3"/>
    <circle cx="896" cy="600" r="4"/><circle cx="904" cy="592" r="3"/>
  </g>

  <!-- Expanding rings from F5 (534,301) -->
  <circle cx="534" cy="301" r="45" fill="none" stroke="#FFD700" stroke-width="2.5" opacity="0.35" filter="url(#arcGlow)"/>
  <circle cx="534" cy="301" r="70" fill="none" stroke="#FF9500" stroke-width="1.5" opacity="0.2" filter="url(#arcGlow)"/>
  <circle cx="534" cy="301" r="100" fill="none" stroke="#FF6600" stroke-width="1" opacity="0.1"/>

  <!-- Electric arcs along row 5 -->
  <path d="M 568,301 Q 600,288 636,301 Q 660,308 704,301" stroke="#FFE566" stroke-width="1.8" fill="none" opacity="0.7" filter="url(#arcGlow)"/>
  <path d="M 500,301 Q 470,288 432,301 Q 408,310 364,301" stroke="#FFE566" stroke-width="1.8" fill="none" opacity="0.7" filter="url(#arcGlow)"/>
  <path d="M 704,301 Q 730,293 772,301" stroke="#FFE566" stroke-width="1.2" fill="none" opacity="0.4" filter="url(#arcGlow)"/>
  <path d="M 364,301 Q 330,308 296,301 Q 262,294 228,301" stroke="#FFE566" stroke-width="1.2" fill="none" opacity="0.4" filter="url(#arcGlow)"/>
  <path d="M 228,301 Q 200,306 194,301" stroke="#FFE566" stroke-width="0.8" fill="none" opacity="0.2"/>
  <path d="M 772,301 Q 800,296 806,301" stroke="#FFE566" stroke-width="0.8" fill="none" opacity="0.2"/>

  <!-- Vertical stray sparks -->
  <path d="M 534,282 Q 528,268 534,254 Q 538,246 530,238" stroke="#FFE566" stroke-width="1.2" fill="none" opacity="0.5" filter="url(#arcGlow)"/>
  <path d="M 534,320 Q 540,334 534,348 Q 528,356 536,368" stroke="#FFE566" stroke-width="1.2" fill="none" opacity="0.5" filter="url(#arcGlow)"/>
  <path d="M 552,284 L 570,268 L 562,258" stroke="#FFFFA0" stroke-width="1" fill="none" opacity="0.6" filter="url(#arcGlow)"/>
  <path d="M 516,284 L 500,270 L 510,260" stroke="#FFFFA0" stroke-width="1" fill="none" opacity="0.6" filter="url(#arcGlow)"/>
  <path d="M 552,318 L 566,334 L 556,344" stroke="#FFFFA0" stroke-width="1" fill="none" opacity="0.5" filter="url(#arcGlow)"/>
  <path d="M 516,318 L 504,332 L 514,342" stroke="#FFFFA0" stroke-width="1" fill="none" opacity="0.5" filter="url(#arcGlow)"/>

  <!-- Spark core at F5 -->
  <circle cx="534" cy="301" r="30" fill="url(#sparkCore)" opacity="0.6" filter="url(#sparkGlow)"/>
  <circle cx="534" cy="301" r="18" fill="url(#sparkCore)" opacity="0.85" filter="url(#sparkGlow)"/>
  <circle cx="534" cy="301" r="8" fill="#FFFFFF" opacity="0.95" filter="url(#sparkGlow)"/>
  <circle cx="534" cy="301" r="3" fill="#FFFFFF"/>
  <polygon points="534,271 526,295 533,295 525,331 542,301 535,301" fill="url(#boltFill)" opacity="0.9" filter="url(#sparkGlow)"/>

  <!-- Word Bomb card -->
  <rect x="310" y="542" width="380" height="110" rx="12" fill="#0A0F18" opacity="0.92"/>
  <rect x="310" y="542" width="380" height="110" rx="12" fill="none" stroke="#C8922A" stroke-width="1.5" opacity="0.6"/>
  <rect x="310" y="542" width="80" height="110" rx="12" fill="#1A1400" opacity="0.9"/>
  <rect x="350" y="542" width="40" height="110" fill="#1A1400" opacity="0.9"/>
  <rect x="310" y="542" width="80" height="110" rx="12" fill="none" stroke="#FFD700" stroke-width="1.5" opacity="0.5" filter="url(#arcGlow)"/>
  <text x="350" y="590" font-family="Georgia, serif" font-size="11" text-anchor="middle" fill="#8B7040" letter-spacing="2">TIER</text>
  <text x="350" y="616" font-family="Georgia, serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#FFD700" filter="url(#arcGlow)">I</text>
  <line x1="392" y1="550" x2="392" y2="644" stroke="#C8922A" stroke-width="1" opacity="0.4"/>
  <text x="545" y="572" font-family="Georgia, serif" font-size="26" font-weight="bold" text-anchor="middle" fill="#FFE566" filter="url(#arcGlow)" letter-spacing="4">SPARK</text>
  <text x="545" y="598" font-family="'Courier New', monospace" font-size="14" text-anchor="middle" fill="#FFFFFF" letter-spacing="8" opacity="0.7">A  R  T</text>
  <text x="545" y="622" font-family="Calibri, sans-serif" font-size="12" text-anchor="middle" fill="#C8A850" opacity="0.85">Row 5 scanned — tile presence revealed</text>
  <text x="545" y="638" font-family="Calibri, sans-serif" font-size="11" text-anchor="middle" fill="#8B7040" opacity="0.7">3 letters spent  •  positions remain hidden</text>

  <!-- Title -->
  <text x="500" y="52" font-family="Georgia, serif" font-size="12" text-anchor="middle" fill="#6B4F1A" letter-spacing="6" opacity="0.8">LEXICON  —  WORD BOMB</text>
  <line x1="200" y1="60" x2="800" y2="60" stroke="#3A2A08" stroke-width="1" opacity="0.5"/>

  <!-- Background watermark -->
  <text x="500" y="330" font-family="Georgia, serif" font-size="100" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#FFD700" opacity="0.03" letter-spacing="10">SPARK</text>

</svg>
